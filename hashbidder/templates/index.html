<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hashbidder Dashboard</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            margin: 0;
            padding: 2rem;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 1200px;
            background-color: #1e1e1e;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }
        nav {
            margin-bottom: 2rem;
            border-bottom: 1px solid #333;
            padding-bottom: 1rem;
        }
        h1 {
            color: #ffffff;
            margin-top: 0;
        }
        .nav-links a {
            margin-right: 1.5rem;
            text-decoration: none;
            color: #bb86fc;
            font-weight: 500;
            transition: color 0.2s;
        }
        .nav-links a:hover {
            color: #03dac6;
        }
        .status-header {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        .status-chip {
            padding: 0.5rem 1rem;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
            display: flex;
            align-items: center;
        }
        .status-green {
            background-color: #1b5e20;
            color: #81c784;
            border: 1px solid #2e7d32;
        }
        .status-red {
            background-color: #b71c1c;
            color: #ef9a9a;
            border: 1px solid #c62828;
        }
        .status-blue {
            background-color: #0d47a1;
            color: #90caf9;
            border: 1px solid #1565c0;
        }
    </style>
</head>
<body>
    <div class="container">
        <nav>
            <div class="nav-links">
                <a href="/">Dashboard</a>
                <a href="/settings">Settings</a>
            </div>
        </nav>
        <h1>Hashbidder Performance Dashboard</h1>
        
        <div class="status-header">
            <span class="status-chip {{ 'status-green' if current_status and current_status.braiins_connected else 'status-red' }}">
                Braiins
            </span>
            <span class="status-chip {{ 'status-green' if current_status and current_status.ocean_connected else 'status-red' }}">
                Ocean
            </span>
            <span class="status-chip {{ 'status-green' if current_status and current_status.mempool_connected else 'status-red' }}">
                Mempool
            </span>
            <span class="status-chip status-blue">
                Balance: {{ "{:,}".format(current_status.balance_sat) if current_status and current_status.balance_sat is not None else "N/A" }} sats
            </span>
        </div>

        <div id="dashboard-content">
            <p>Welcome to the Hashbidder dashboard. Metrics will appear here.</p>
            <!-- Historical data could be passed to Chart.js here -->
            <canvas id="performanceChart" width="800" height="400"></canvas>
        </div>
    </div>
</body>
</html>
