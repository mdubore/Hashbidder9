<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hashbidder Settings</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            margin: 0;
            padding: 2rem;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 800px;
            background-color: #1e1e1e;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        nav {
            margin-bottom: 2rem;
            border-bottom: 1px solid #333;
            padding-bottom: 1rem;
        }
        h1 {
            color: #ffffff;
            margin-top: 0;
        }
        .nav-links a {
            margin-right: 1.5rem;
            text-decoration: none;
            color: #bb86fc;
            font-weight: 500;
            transition: color 0.2s;
        }
        .nav-links a:hover {
            color: #03dac6;
        }
        form {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .form-hint {
            display: block;
            color: #888;
            margin-top: 0.25rem;
            font-size: 0.875rem;
        }
        label {
            font-weight: 600;
            color: #b0b0b0;
        }
        input, select {
            padding: 0.75rem;
            background-color: #2c2c2c;
            border: 1px solid #444;
            border-radius: 8px;
            color: #ffffff;
            font-size: 1rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #bb86fc;
            box-shadow: 0 0 0 2px rgba(187, 134, 252, 0.2);
        }
        button {
            padding: 0.85rem;
            background-color: #bb86fc;
            color: #121212;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            font-size: 1rem;
            transition: background-color 0.2s, transform 0.1s;
        }
        button:hover {
            background-color: #9965f4;
            transform: translateY(-1px);
        }
        button:active {
            transform: translateY(0);
        }
        #response {
            margin-top: 1.5rem;
            padding: 1rem;
            border-radius: 8px;
        }
        #target-hashrate-fields {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <nav>
            <div class="nav-links">
                <a href="/">Dashboard</a>
                <a href="/settings">Settings</a>
            </div>
        </nav>
        <h1>Settings</h1>
        <form hx-post="/settings" hx-target="#response" hx-swap="innerHTML">
            <div class="form-group">
                <label for="mode">Mode</label>
                <select id="mode" name="mode">
                    <option value="target-hashrate" {% if config.get('mode') == 'target-hashrate' %}selected{% endif %}>Target Hashrate</option>
                    <option value="explicit-bids" {% if config.get('mode') == 'explicit-bids' %}selected{% endif %}>Explicit Bids</option>
                </select>
            </div>

            <div class="form-group">
                <label for="default_amount_sat">Default Bid Amount (sat)</label>
                <input type="number" id="default_amount_sat" name="default_amount_sat" value="{{ config.get('default_amount_sat', 100000) }}" required>
            </div>

            <div class="form-group">
                <label for="upstream_url">Upstream URL</label>
                <input type="text" id="upstream_url" name="upstream_url" value="{{ config.get('upstream', {}).get('url', '') }}" placeholder="stratum+tcp://..." required>
            </div>

            <div class="form-group">
                <label for="upstream_identity">Upstream Identity (Worker Name)</label>
                <input type="text" id="upstream_identity" name="upstream_identity" value="{{ config.get('upstream', {}).get('identity', '') }}" required>
            </div>

            <div id="target-hashrate-fields" style="display: {% if config.get('mode', 'target-hashrate') == 'target-hashrate' %}flex{% else %}none{% endif %};">
                <div class="form-group">
                    <label for="target_hashrate_ph_s">Target Hashrate (PH/s)</label>
                    <input type="number" step="0.1" id="target_hashrate_ph_s" name="target_hashrate_ph_s" value="{{ config.get('target_hashrate_ph_s', 0) }}">
                </div>

                <div class="form-group">
                    <label for="max_bids_count">Max Bids Count</label>
                    <input type="number" id="max_bids_count" name="max_bids_count" value="{{ config.get('max_bids_count', 1) }}">
                </div>

                <div class="form-group">
                    <label for="max_price_sat_per_ph_day">Max Price (sat/PH/day, optional)</label>
                    <input type="number" min="1" id="max_price_sat_per_ph_day" name="max_price_sat_per_ph_day" value="{{ config.get('max_price_sat_per_ph_day', '') }}" placeholder="leave blank for no cap">
                    <small class="form-hint">Must be at least one market tick; check the current tick in daemon logs.</small>
                </div>
            </div>

            <button type="submit">Save Settings</button>
        </form>
        <div id="response"></div>
    </div>

    <script>
        document.getElementById('mode').addEventListener('change', function() {
            var fields = document.getElementById('target-hashrate-fields');
            if (this.value === 'target-hashrate') {
                fields.style.display = 'flex';
            } else {
                fields.style.display = 'none';
            }
        });
    </script>
</body>
</html>
